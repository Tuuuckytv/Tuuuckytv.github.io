<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="icon" href="spiderman.png" type="image/png">
<style>
  body {
    background-color: #373b41;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
  }

  #imageContainer {
    position: relative;
  }

  #glow {
    position: absolute;
    top: 50%;
    left: calc(50% - 5px - 10px); /* Move the glow to the left by 10 pixels */
    transform: translate(-50%, -50%);
    width: 276px; /* Increase the size of the glow by 15% */
    height: 276px; /* Increase the size of the glow by 15% */
    border-radius: 50%;
    background: radial-gradient(rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 80%); /* Enhance the glow effect with smoother transition */
    filter: blur(20px); /* Increase the blur radius for a softer glow */
    z-index: 1; /* Ensure glow is behind the image */
  }

  #image {
    width: 200px; /* Adjust the width of the image as needed */
    height: auto; /* Maintain aspect ratio */
    position: relative; /* Ensure the image can be positioned in front of the glow */
    z-index: 2; /* Ensure image is in front of the glow */
    opacity: 1; /* Set opacity to full */
    transition: left 0.3s ease; /* Smooth transition when moving left or right */
  }

  #boomAnimation {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3; /* Set the z-index of the animation to be in front of the image */
  }

</style>
</head>
<body>
  <div id="imageContainer">
    <div id="glow"></div>
    <img src="onenote.png" alt="OneNote" id="image">
    <img src="boom.gif" alt="Boom" id="boomAnimation" style="display: none;">
  </div>

  <script>
    function moveLeft() {
      var oneNoteImage = document.getElementById('image');
      var currentLeft = parseFloat(getComputedStyle(oneNoteImage).left);
      oneNoteImage.style.left = (currentLeft - 10) + 'px'; // Adjust the value (10 pixels) as needed for finer control
    }

    function moveRight() {
      var oneNoteImage = document.getElementById('image');
      var currentLeft = parseFloat(getComputedStyle(oneNoteImage).left);
      oneNoteImage.style.left = (currentLeft + 50) + 'px'; // Adjust the value (10 pixels) as needed for finer control
    }
  </script>
</body>
</html>
