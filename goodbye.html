<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="icon" href="spiderman.png" type="image/png">
<style>
  body {
    background-color: #373b41;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #imageContainer {
    position: relative;
    width: 200px; /* Adjust the width of the image as needed */
    height: auto; /* Maintain aspect ratio */
  }

  #image {
    width: 100%;
    height: auto;
    border-radius: 10px; /* Adjust border radius as needed */
    box-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 60px #fff, 0 0 80px #fff, 0 0 100px #fff, 0 0 120px #fff, 0 0 140px #fff;
  }

  #glow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 10px; /* Adjust border radius as needed */
    background: radial-gradient(circle, #fff 0%, transparent 50%);
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  #buttonContainer {
    margin-top: 20px;
  }

  #fadeLink {
    display: none;
    color: #fff;
    font-size: 20px;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>
  <div id="imageContainer">
    <img src="onenote.png" alt="OneNote" id="image">
    <div id="glow"></div>
  </div>
  
  <div id="buttonContainer">
    <button onclick="playGif()">Play GIF</button>
    <a href="https://innoxtrading-my.sharepoint.com/:o:/g/personal/kyle_t_innox_co_uk/Ekxeq1YqCmlBo-tVbaMjbp4BsX1AjtzrmmnjN25ElTdvXA?e=wlUX67" id="fadeLink" target="_blank">Click Here</a>
  </div>

  <script>
    function playGif() {
      var imageContainer = document.getElementById('imageContainer');
      var glow = document.getElementById('glow');
      var fadeLink = document.getElementById('fadeLink');

      // Display the glow
      glow.style.opacity = 1;

      // Play the GIF
      var gif = new Image();
      gif.src = 'boom.gif';
      imageContainer.appendChild(gif);

      // Show the fade-in link
      fadeLink.style.display = 'block';
      setTimeout(function() {
        fadeLink.style.opacity = 1;
      }, 1000); // Adjust the delay as needed
    }
  </script>
</body>
</html>
