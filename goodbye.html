<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="icon" href="spiderman.png" type="image/png">
<style>
  body {
    background-color: #373b41;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
  }

  #imageContainer {
    border: 3px solid #ffffff;
    border-radius: 10px; /* Adjust border radius as needed */
    padding: 20px;
    box-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff, 0 0 60px #ffffff, 0 0 80px #ffffff, 0 0 100px #ffffff, 0 0 120px #ffffff, 0 0 140px #ffffff;
  }

  #image {
    width: 200px; /* Adjust the width of the image as needed */
    height: auto; /* Maintain aspect ratio */
  }

  #buttonContainer {
    margin-top: 20px;
    display: flex; /* Set button container to flex */
    align-items: center; /* Align items vertically */
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #466799; /* Changed button color */
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #3c5573; /* Darken button color on hover */
  }

  #fadeLinkContainer {
    display: none; /* Initially hide the link container */
    flex-direction: column; /* Align items vertically */
    align-items: flex-end; /* Align items to the right */
    margin-top: 10px;
  }

  #fadeLink {
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;
    opacity: 0; /* Initially set opacity to 0 for fade-in effect */
    transition: opacity 1s ease; /* Fade-in transition */
  }

  #clickHere {
    margin-left: 10px; /* Add space between button and image */
  }
</style>
</head>
<body>
  <div id="imageContainer">
    <img src="onenote.png" alt="OneNote" id="image">
  </div>

  <div id="buttonContainer">
    <button onclick="playAnimation()">Play Animation</button>
    <div id="fadeLinkContainer">
      <a id="fadeLink" href="https://innoxtrading-my.sharepoint.com/:o:/g/personal/kyle_t_innox_co_uk/Ekxeq1YqCmlBo-tVbaMjbp4BsX1AjtzrmmnjN25ElTdvXA?e=wlUX67" target="_blank">Download Link</a>
      <img id="clickHere" src="clickhere.png" alt="Click Here">
    </div>
  </div>

  <script>
    function playAnimation() {
      var imageContainer = document.getElementById('imageContainer');
      var animationImage = document.createElement('img');
      animationImage.src = 'boom.gif';
      animationImage.style.position = 'absolute';
      animationImage.style.top = '50%';
      animationImage.style.left = '50%';
      animationImage.style.transform = 'translate(-50%, -50%)';
      imageContainer.appendChild(animationImage);

      setTimeout(function() {
        animationImage.remove();
        var fadeLinkContainer = document.getElementById('fadeLinkContainer');
        fadeLinkContainer.style.display = 'flex'; // Display the link container
        var fadeLink = document.getElementById('fadeLink');
        fadeLink.style.opacity = '1'; // Fade in the link
      }, 2000); // Adjust the delay as needed (in milliseconds)
    }
  </script>
</body>
</html>
