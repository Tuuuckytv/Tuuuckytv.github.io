<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="shortcut icon" type="image/png" href="spiderman.png">
<style>
  body {
    background-color: #373b41;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* Adjusted alignment to top */
    align-items: center;
    font-family: Consolas, Arial, sans-serif; /* Change font to Consolas */
    color: #e5cd0b;
    overflow: hidden; /* Hide overflow content */
    background-image: url('alien.png'); /* Add alien image as background */
    background-size: cover; /* Cover the entire background */
    background-position: center; /* Center the background image */
    background-position-y: calc(100% - 80px); /* Position background image below the header */
  }
  header {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: #000000; /* Set header color to black */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2; /* Ensure header is above background image */
    animation: fadeInHeader 1s ease forwards; /* Add fadeIn animation */
    height: 80px; /* Set header height */
  }
  @keyframes fadeInHeader {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-size: 60px;
    margin-bottom: 20px;
    text-align: center; /* Center align the text */
  }
  nav {
    position: fixed;
    top: 0;
    left: -220px; /* Initially hide the menu off-screen */
    width: 220px; /* Increased width for better appearance */
    height: 100vh;
    background-color: #1f1f1f; /* Dark background color */
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* Align items at the top */
    align-items: center;
    z-index: 3; /* Ensure menu is on top of header */
    padding-top: 50px; /* Add padding to align menu items vertically */
    transition: left 0.3s ease; /* Add transition for smooth animation */
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* Add box shadow for depth */
  }
  nav.show {
    left: 0; /* Show the menu by bringing it to the screen */
  }
  nav a {
    color: #e5cd0b;
    text-decoration: none;
    margin: 2.5px 0;
    padding: 10px 20px;
    font-size: 24px;
    border-radius: 8px; /* Rounded corners for buttons */
    transition: background-color 0.3s; /* Smooth transition for hover effect */
  }
  nav a:hover {
    background-color: #333; /* Darken background on hover */
  }
  .burger {
    position: fixed;
    top: 20px;
    left: 20px; /* Static position regardless of menu visibility */
    z-index: 10;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 30px;
    height: 24px;
    background-color: transparent;
    border: none;
    padding: 0;
    transition: left 0.5s ease; /* Add transition for smooth animation */
  }
  .burger div {
    width: 30px;
    height: 4px;
    background-color: #e5cd0b;
    transition: all 0.3s ease; /* Add transition for smooth animation */
    border-radius: 2px; /* Rounded corners for burger lines */
  }
  .burger.active div:nth-child(1) {
    transform: translateY(10px) rotate(45deg);
  }
  .burger.active div:nth-child(2) {
    opacity: 0;
  }
  .burger.active div:nth-child(3) {
    transform: translateY(-10px) rotate(-45deg);
  }

  footer {
    position: fixed;
    bottom: 0;
    right: 0;
    padding: 10px;
    color: #e5cd0b;
    font-family: Consolas, Arial, sans-serif;
    z-index: 1;
    font-size: 12px;
    display: flex;
    align-items: center;
  }

  .footer-icons {
    margin-left: 10px;
  }

  .footer-icon {
    margin-right: 5px;
  }
</style>
</head>
<body>
  <header>
    <h1>Welcome</h1>
  </header>
  <button class="burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </button>
  <nav id="menu">
    <a href="https://kyletuck.com">Home</a>
    <a href="food" class="menu-button">Food</a>
    <a href="jobs">Jobs</a>
    <a href="customerservice" class="menu-button">One Note</a>
    <a href="private">Private</a>
    <a href="work">Work</a>
  </nav>

  <footer>
    <p>&copy; 2024 kyletuck.com. All rights reserved.</p>
    <div class="footer-icons">
      <a href="https://www.instagram.com/kyle_tuck99/" target="_blank"><img src="instagram.png" alt="Instagram" class="footer-icon"></a>
      <a href="https://www.linkedin.com/in/kyle-tuck-667416205" target="_blank"><img src="linkedin.png" alt="LinkedIn" class="footer-icon"></a>
      <a href="https://www.youtube.com/@TuuuckTV" target="_blank"><img src="youtube.png" alt="YouTube" class="footer-icon"></a>
    </div>
  </footer>

<script>
  function toggleMenu() {
    var menu = document.getElementById('menu');
    menu.classList.toggle('show');
    var burger = document.querySelector('.burger');
    burger.classList.toggle('active');
  }
</script>
</body>
</html>
