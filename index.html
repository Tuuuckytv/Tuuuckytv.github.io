<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #F1F5F9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: flex-start; /* Align content to the top */
        }

        .header {
            background-color: #01A0C0;
            color: white;
            padding: 30px;
            font-size: 24px;
            width: 100%;
            text-align: center; /* Center the text */
        }

        .header img {
            display: inline; /* Make the image inline with text */
            vertical-align: middle; /* Align the image vertically with text */
            margin-right: 10px; /* Add some spacing between the image and text */
            height: 30px; /* Adjust the image height to 30px */
        }

        .content {
            padding: 20px;
        }

        .button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #01A0C0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            text-decoration: none;
        }

        /* Media Query for Mobile Devices */
        @media screen and (max-width: 768px) {
            .header {
                font-size: 20px; /* Reduce the header font size for mobile devices */
                padding: 15px; /* Adjust header padding */
            }

            .header img {
                height: 20px; /* Adjust the image height for mobile devices */
            }

            .content {
                padding: 10px; /* Adjust content padding for mobile devices */
            }

            .button {
                bottom: 10px; /* Adjust button position for mobile devices */
                right: 10px;
                padding: 8px 15px; /* Adjust button padding */
                font-size: 14px; /* Reduce button font size for mobile devices */
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="spider.png" alt="Spider Image" style="height: 30px;"> Your Page Title
    </div>
    <div class="content">
        <!-- Your content for the second page goes here -->
        <p>Sean is a big Gimp</p>
    </div>

    <a class="button" href="https://youtu.be/dQw4w9WgXcQ?si=a0MVje-KSEOEXOJP" target="_blank">Learn More</a>
    
    <script>
        // Function to update the countdown
        function updateCountdown(endTime, countdownElement) {
            const now = new Date().getTime();
            let distance = endTime - now;

            if (distance < 0) {
                // If the time has already passed today, reset it to the same time tomorrow
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(endTime.getUTCHours(), endTime.getUTCMinutes(), endTime.getUTCSeconds(), 0);
                distance = tomorrow - now;
            }

            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownElement.textContent = `${hours}h ${minutes}m ${seconds}s`;

            // Check if the timer has reached the target time
            if (hours === 0 && minutes === 0 && seconds === 0) {
                countdownElement.style.backgroundColor = "red";
                setTimeout(() => {
                    countdownElement.style.backgroundColor = "#EC008C";
                }, 1000);
            }
        }

        // Set the target times (3 PM and 5 PM UK time)
        const dpdEndTime = new Date();
        dpdEndTime.setUTCHours(15, 0, 0, 0);
        const rmEndTime = new Date();
        rmEndTime.setUTCHours(17, 0, 0, 0);

        // Update countdowns every second
        setInterval(function () {
            updateCountdown(dpdEndTime, document.getElementById("dpdCountdown"));
            updateCountdown(rmEndTime, document.getElementById("rmCountdown"));
        }, 1000);
    </script>
</body>
</html>
