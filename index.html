<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="shortcut icon" type="image/png" href="spiderman.png">
<style>
  body {
    background-color: #373b41;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    font-family: Consolas, Arial, sans-serif;
    color: #e5cd0b;
  }
  header {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
    animation: fadeInHeader 1s ease forwards;
    height: 80px;
  }
  @keyframes fadeInHeader {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-size: 60px;
    margin-bottom: 20px;
    text-align: center;
    margin: 0;
  }
  nav {
    position: fixed;
    top: 0;
    left: -220px;
    width: 220px;
    height: 100vh;
    background-color: #1f1f1f;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    z-index: 3;
    padding-top: 50px;
    transition: left 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
  }
  nav.show {
    left: 0;
  }
  nav a {
    color: #e5cd0b;
    text-decoration: none;
    margin: 2.5px 0;
    padding: 10px 20px;
    font-size: 24px;
    border-radius: 8px;
    transition: background-color 0.3s;
  }
  nav a:hover {
    background-color: #333;
  }
  .burger {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 30px;
    height: 24px;
    background-color: transparent;
    border: none;
    padding: 0;
    transition: left 0.5s ease;
  }
  .burger div {
    width: 30px;
    height: 4px;
    background-color: #e5cd0b;
    transition: all 0.3s ease;
    border-radius: 2px;
  }
  .burger.active div:nth-child(1) {
    transform: translateY(10px) rotate(45deg);
  }
  .burger.active div:nth-child(2) {
    opacity: 0;
  }
  .burger.active div:nth-child(3) {
    transform: translateY(-10px) rotate(-45deg);
  }

  footer {
    position: fixed;
    bottom: 0;
    right: 0;
    padding: 10px;
    color: #e5cd0b;
    font-family: Consolas, Arial, sans-serif;
    z-index: 1;
    font-size: 12px;
    display: flex;
    align-items: center;
  }

  .footer-icons {
    margin-left: 10px;
  }

  .footer-icon {
    margin-right: 5px;
  }

  .alien-image {
    width: 60%;
    margin-top: 100px; /* Adjust margin to position image below header */
  }
</style>
</head>
<body>
  <header>
    <h1>Welcome</h1>
  </header>
  <button class="burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </button>
  <nav id="menu">
    <a href="https://kyletuck.com">Home</a>
    <a href="food" class="menu-button">Food</a>
    <a href="jobs">Jobs</a>
    <a href="gclinkgenerator">GoCardless</a>
    <a href="customerservice" class="menu-button">One Note</a>
    <a href="private">Private</a>
    <a href="work">Work</a>
    <a href="Tattoo">Tattoo</a>
  </nav>

  <img src="alien.png" alt="Alien" class="alien-image">

  <footer>
    <p>&copy; 2024 kyletuck.com. All rights reserved.</p>
    <div class="footer-icons">
      <a href="https://www.instagram.com/kyle_tuck99/" target="_blank"><img src="instagram.png" alt="Instagram" class="footer-icon"></a>
      <a href="https://www.linkedin.com/in/kyle-tuck-667416205" target="_blank"><img src="linkedin.png" alt="LinkedIn" class="footer-icon"></a>
      <a href="https://www.youtube.com/@TuuuckTV" target="_blank"><img src="youtube.png" alt="YouTube" class="footer-icon"></a>
      <a href="https://incognitoplanet.com/" target="_blank"><img src="spiderman.png" alt="KT" class="footer-icon"></a>
    </div>
  </footer>

<script>
  function toggleMenu() {
    var menu = document.getElementById('menu');
    menu.classList.toggle('show');
    var burger = document.querySelector('.burger');
    burger.classList.toggle('active');
  }
</script>
</body>
</html>
