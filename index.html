<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('faith.gif');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        p {
            color: #ffffff;
            text-align: center;
        }

        .floating-image {
            position: absolute;
            animation: floatImage 10s linear infinite;
        }

        @keyframes floatImage {
            0% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(1px, 100px);
            }
            100% {
                transform: translate(0, 0);
            }
        }
    </style>
</head>
<body>
    <p>Sean is a big Gimp</p>
    <img src="Faith2.jpg" alt="Floating Image" class="floating-image">
</body>
</html>
