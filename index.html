<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
        }

        #content {
            text-align: center;
        }

        #countdown, #merry-christmas {
            font-size: 45px; /* Adjust the font size as needed for smaller screens */
            font-family: 'Digital7', "Courier New", monospace;
        }

        @font-face {
            font-family: 'Digital7';
            src: url('digital-7.ttf') format('truetype'); /* Specify the correct path to your font file */
        }

        #countdown {
            color: red;
        }

        #merry-christmas {
            color: green;
        }

        .digital7 {
            letter-spacing: 5px; /* Adjust the letter-spacing as needed */
        }
    </style>
</head>
<body>
    <div id="content">
        <div id="merry-christmas" class="digital7"></div>
        <div id="countdown" class="digital7"></div>
    </div>

    <script>
        function updateCountdown() {
            const targetDate = new Date("02/04/2024").getTime();
            const now = new Date().getTime();
            const timeRemaining = targetDate - now;

            if (timeRemaining <= 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").innerHTML = "Countdown expired!";
            } else {
                const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

                const countdownText = `${days}:${hours}:${minutes}:${seconds}`;
                document.getElementById("countdown").innerHTML = countdownText;
            }
        }

        function checkAndDisplayChristmasMessage() {
            const now = new Date();
            const isChristmas = now.getMonth() === 11 && now.getDate() === 25;

            if (isChristmas) {
                document.getElementById("merry-christmas").innerHTML = "M:e:r:r:y: :C:h:r:i:s:t:m:a:s!";
            }
        }

        // Initial call to display the Christmas message
        checkAndDisplayChristmasMessage();

        // Check and display the Christmas message periodically (every 1 second)
        const christmasMessageInterval = setInterval(checkAndDisplayChristmasMessage, 1000);

        // Update the countdown
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
