<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Your Page Title</title>
    <style>
        body {
            background-image: url('Background_web.jpg');
            background-size: cover;
        }

        @media (max-width: 768px) {
            body {
                background-size: contain;
                background-repeat: no-repeat;
            }
        }

        /* Styling for the side panel */
        .side-panel {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            right: 0;
            background-color: #333; /* Background color of the panel */
            overflow-x: hidden;
            transition: 0.5s;
        }

        /* Styling for the side panel content */
        .side-panel-content {
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: white;
        }

        /* Styling for the menu button */
        #menu-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #333; /* Background color of the button */
            padding: 10px;
            cursor: pointer;
        }

        /* Styling for the close button */
        #close-button {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Menu button to open the side panel -->
    <div id="menu-button">&#9776;</div>
    
    <!-- Side panel -->
    <div id="side-panel" class="side-panel">
        <div class="side-panel-content">
            <span id="close-button">&times;</span>
            <h2>Menu</h2>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </div>

    <!-- Content for your webpage -->
    <div class="main-content">
        <h1>Under Maintenance</h1>
        <p>Updating as I go.</p>
    </div>

    <script>
        // JavaScript to control the side panel
        const menuButton = document.getElementById("menu-button");
        const sidePanel = document.getElementById("side-panel");
        const closeButton = document.getElementById("close-button");

        menuButton.addEventListener("click", () => {
            sidePanel.style.width = "250px";
        });

        closeButton.addEventListener("click", () => {
            sidePanel.style.width = "0";
        });
    </script>
</body>
</html>
