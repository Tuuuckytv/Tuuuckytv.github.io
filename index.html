<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="spiderman.png" type="image/png"> <!-- Add this line for the favicon -->
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #0c457d; /* Dark Blue Background */
      color: #fff; /* White text */
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      color: #d9534f; /* Reddish color for header */
    }

    #meal-container {
      text-align: center;
      padding: 20px;
      background-color: #4caf50; /* Green Background */
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 16px;
      cursor: pointer;
      border: 2px solid #d9534f; /* Reddish border */
      border-radius: 4px;
      background-color: #d9534f; /* Reddish background */
      color: #fff;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      width: 150px; /* Set a fixed width for the buttons */
    }

    button:disabled {
      background-color: #6c757d;
      border-color: #6c757d;
      color: #b0b0b0;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background-color: #c9302c; /* Darker Reddish background on hover */
      border-color: #c9302c; /* Darker Reddish border on hover */
    }

    p {
      font-size: 18px;
      margin: 10px 0;
    }

    .generate-button {
      margin-top: 20px;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .button-row {
      display: flex;
      margin-top: 10px;
    }
  </style>
  <title>Oh, fuck</title>
</head>

<body>

  <header>
    <h1 style="color: #d9534f;">What We Gonna Eat?</h1>
  </header>

  <div class="button-container">
    <div class="button-row">
      <button id="breakfastButton" onclick="generateMeal('breakfast')">Breakfast</button>
      <button id="dinnerButton" onclick="generateMeal('dinner')">Dinner</button>
    </div>
    <div class="button-row">
      <button id="teaButton" onclick="generateMeal('tea')">Tea</button>
      <button id="fridayButton" onclick="generateMeal('friday')">Payday</button>
    </div>
  </div>

  <div id="meal-container">
    <!-- Generated meal will be displayed here -->
  </div>

  <script>
    let timeoutId;

    // Disable the specified button and set a timeout to re-enable it
    function disableButton(buttonId, timeout) {
      const button = document.getElementById(buttonId);
      button.disabled = true;
      setTimeout(() => {
        button.disabled = false;
      }, timeout);
    }

    async function fetchMealsFromFile(file) {
      try {
        const response = await fetch(file);
        const text = await response.text();
        return text.split('\n').map(line => line.trim()).filter(Boolean);
      } catch (error) {
        console.error('Error fetching meals:', error);
        return [];
      }
    }

    const meals = {
      breakfast: [],
      dinner: [],
      tea: [],
      friday: [] // Added Friday meals
    };

    // Fetch breakfast meals from the file
    fetchMealsFromFile('breakfast.txt').then(data => {
      meals.breakfast = data;
    });

    // Fetch dinner meals from the file
    fetchMealsFromFile('dinner.txt').then(data => {
      meals.dinner = data;
    });

    // Fetch tea meals from the file
    fetchMealsFromFile('tea.txt').then(data => {
      meals.tea = data;
    });

    // Fetch Friday meals from the file
    fetchMealsFromFile('friday.txt').then(data => {
      meals.friday = data;
    });

    async function generateMeal(category) {
      clearTimeout(timeoutId); // Clear existing timeout

      const mealContainer = document.getElementById('meal-container');
      const categoryMeals = meals[category];
      const buttonId = `${category}Button`;

      if (categoryMeals.length === 0) {
        mealContainer.innerHTML = `<p>No meals available for ${category}.</p>`;
        return;
      }

      const randomIndex = Math.floor(Math.random() * categoryMeals.length);
      const generatedMeal = categoryMeals[randomIndex];

      // Display the generated meal
      mealContainer.innerHTML = `<p>${generatedMeal}</p>`;

      // Add a button to generate a new meal in the same category
      mealContainer.innerHTML += `<button class="generate-button" onclick="generateMeal('${category}')">Generate New ${category.charAt(0).toUpperCase() + category.slice(1)} Meal</button>`;

      // Set a new timeout to refresh the page after 20 seconds
      timeoutId = setTimeout(() => {
        location.reload();
      }, 20 * 1000); // 20 seconds in milliseconds

      // Disable the button for a certain duration
      disableButton(buttonId, 20000); // 20 seconds in milliseconds
    }
  </script>

</body>

</html>
