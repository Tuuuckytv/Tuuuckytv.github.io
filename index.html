<!DOCTYPE html>
<html>
<head>
    <title>Countdown Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #F1F5F9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .header {
            background-color: #01A0C0;
            color: white;
            padding: 30px;
            font-size: 24px;
            width: 100%;
            text-align: center;
        }

        .header img {
            display: inline;
            vertical-align: middle;
            margin-right: 10px;
            height: 30px;
        }

        .countdown-timers {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .countdown-timer {
            background-color: #EC008C;
            color: white;
            border-radius: 5px;
            padding: 10px;
            font-size: 20px;
            text-align: center;
            transition: background-color 0.5s;
        }

        .countdown-label {
            font-size: 18px;
            margin-top: 10px;
        }

        .button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #01A0C0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            text-decoration: none;
        }

        #quote-text {
            word-wrap: break-word;
            max-width: 90%;
            margin: 0 auto;
        }

        @media screen and (max-width: 768px) {
            .header {
                font-size: 20px;
                padding: 15px;
            }

            .header img {
                height: 20px;
            }

            .countdown-timer {
                font-size: 16px;
                padding: 8px;
            }

            .countdown-label {
                font-size: 14px;
            }

            .button {
                bottom: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="spider.png" alt="Spider Image" style="height: 30px;"> Delivery cut-off
    </div>
    <div id="quote-container">
        <p id="quote-text">Loading...</p>
        <button id="new-quote-button">Get Quote</button>
    </div>
    <div class="countdown-timers">
        <div>
            <div class="countdown-label">DPD Next Day Cut-Off</div>
            <div class="countdown-timer" id="dpdCountdown">00h 00m 00s</div>
        </div>
        <div>
            <div class="countdown-label">Royal Mail Express Cut-Off</div>
            <div class="countdown-timer" id="rmCountdown">00h 00m 00s</div>
        </div>
    </div>
    <a class="button" href="https://youtu.be/dQw4w9WgXcQ?si=a0MVje-KSEOEXOJP" target="_blank">Learn More</a>

    <script>
        function updateCountdown(endTime, countdownElementId) {
            const countdownElement = document.getElementById(countdownElementId);
            const timeInterval = setInterval(updateTime, 1000);

            function updateTime() {
                const currentTime = new Date();
                const remainingTime = new Date(endTime - currentTime);

                if (remainingTime <= 0) {
                    clearInterval(timeInterval);
                    countdownElement.textContent = "Time's up!";
                } else {
                    const hours = String(remainingTime.getUTCHours()).padStart(2, '0');
                    const minutes = String(remainingTime.getUTCMinutes()).padStart(2, '0');
                    const seconds = String(remainingTime.getUTCSeconds()).padStart(2, '0');
                    countdownElement.textContent = `${hours}h ${minutes}m ${seconds}s`;
                }
            }

            updateTime();
        }

        const dpdCutOffTime = new Date('2023-10-28T15:00:00Z');
        const rmCutOffTime = new Date('2023-10-28T17:00:00Z');

        updateCountdown(dpdCutOffTime, "dpdCountdown");
        updateCountdown(rmCutOffTime, "rmCountdown");

        const quotes = [
            "Do a barrel roll!",
            "Aw shit, here we go again.",
            "The cake is a lie.",
            "I used to be an adventurer like you, then I took an arrow in the knee.",
            "Here's looking at you, kid.",
            "May the Force be with you.",
            "You can't handle the truth!",
            "There's no place like home.",
            "I'll be back.",
            "Keep your friends close, but your enemies closer.",
            "Here's Johnny!",
            "Go ahead, make my day.",
            "Life is like a box of chocolates; you never know what you're gonna get.",
            "You talking to me?",
            "There's no crying in baseball!",
            "I feel the need... the need for speed.",
            "Show me the money!",
            "Why so serious?",
            "To infinity and beyond!",
            "You're gonna need a bigger boat.",
            "I see dead people.",
            "I'm the king of the world!",
            "Keep calm and carry on.",
            "Just keep swimming.",
            "I am Groot.",
            "E.T. phone home.",
            "There's a snake in my boot!",
            "I love the smell of napalm in the morning.",
            "We're not in Kansas anymore.",
            "Houston, we have a problem.",
            "The force will be with you, always.",
            "You are a toy!",
            "I see you.",
            "To be or not to be.",
            "I coulda been a contender.",
            "If you build it, he will come.",
            "I'm king of the world!",
            "I'll have what she's having.",
            "They may take our lives, but they'll never take our freedom!",
            "The first rule of Fight Club is: You do not talk about Fight Club.",
            "You can't make an omelette without breaking a few eggs.",
            "A dream within a dream.",
            "I am Iron Man.",
            "I can do this all day.",
            "I'm always angry.",
            "I am Groot.",
            "I'm just a kid from Brooklyn.",
            "I can't control their fear, only my own.",
            "I could do this all day.",
            "In my culture, death is not the end.",
            "I love you 3000.",
            "I don't have friends; I got family.",
            "Baskin-Robbins always finds out.",
            "I want my bird.",
            "We are Groot.",
            "AVENGERS......Assemble",
            "I can't help everybody, but I can help somebody.",
            "Dormammu, I've come to bargain.",
            "We're the Avengers. We can bust arms dealers all the live-long day, but that up there? That's the endgame.",
            "I'm just a kid who's supposed to be dead by now.",
            "With great power comes great responsibility."
        ];

        const quoteContainer = document.getElementById("quote-container");
        const quoteText = document.getElementById("quote-text");
        const newQuoteButton = document.getElementById("new-quote-button");

        function getRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            return quotes[randomIndex];
        }

        newQuoteButton.addEventListener("click", () => {
            const randomQuote = getRandomQuote();
            quoteText.textContent = randomQuote;
        });

        window.addEventListener("load", () => {
            const randomQuote = getRandomQuote();
            quoteText.textContent = randomQuote;
        });
    </script>
</body>
</html>
