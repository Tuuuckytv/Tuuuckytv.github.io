<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh, Fuck</title>
    <link rel="shortcut icon" type="image/png" href="spiderman.png">
    <style>
        /* Resetting default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styles */
        body {
            background-color: #373b41;
            font-family: Consolas, Arial, sans-serif; /* Consolas as primary font */
            color: #e5cd0b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Header styles */
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        /* Navigation styles */
        nav {
            position: fixed;
            top: 0;
            left: -220px;
            width: 220px;
            height: 100vh;
            background-color: #1f1f1f;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 2;
            padding-top: 50px;
            transition: left 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        nav.show {
            left: 0;
        }

        nav a {
            color: #e5cd0b;
            text-decoration: none;
            margin: 5px 0;
            padding: 10px 20px;
            font-size: 24px;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #333;
        }

        /* Burger menu styles */
        .burger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 24px;
            background-color: transparent;
            border: none;
            padding: 0;
            transition: left 0.5s ease;
        }

        .burger div {
            width: 30px;
            height: 4px;
            background-color: #e5cd0b;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .burger.active div:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }

        .burger.active div:nth-child(2) {
            opacity: 0;
        }

        .burger.active div:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
        }

        /* Footer styles */
        footer {
            position: fixed;
            bottom: 0;
            right: 0;
            padding: 10px;
            color: #e5cd0b;
            font-size: 12px;
            z-index: 1;
        }

        /* Keyframe animation for fadeIn */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Media query for responsiveness */
        @media screen and (max-width: 768px) {
            nav {
                width: 150px;
            }

            nav.show {
                left: -150px;
            }

            nav.show {
                left: -150px;
            }

            nav.show {
                left: -150px;
            }

            .burger {
                left: 10px;
            }
        }
    </style>
</head>

<body>
    <button class="burger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </button>
    <nav id="menu">
        <a href="https://kyletuck.com">Home</a>
        <a href="food" class="menu-button">Food</a>
        <a href="goodbye" class="menu-button">One Note</a>
        <a href="private">Private</a>
        <a href="work">Work</a>
        <a href="social">Social</a>
    </nav>
    <h1>Welcome</h1>

    <footer>
        <p>&copy; 2024 Kyle Tuck. All rights reserved.</p>
    </footer>

    <script>
        function toggleMenu() {
            var menu = document.getElementById('menu');
            menu.classList.toggle('show');
            var burger = document.querySelector('.burger');
            burger.classList.toggle('active');
        }
    </script>
</body>

</html>
