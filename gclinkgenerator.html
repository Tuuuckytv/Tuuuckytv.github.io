<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="icon" href="spiderman.png" type="image/png">
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    font-family: Consolas, Arial, sans-serif;
    color: #e5cd0b;
    background-color: #373b41;
  }

  h2 {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 20px;
  }

  form {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input[type="text"] {
    width: 300px;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #e5cd0b;
    background-color: #1f1f1f;
    color: #e5cd0b;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background-color: #e5cd0b;
    color: #373b41;
    font-family: Consolas, Arial, sans-serif;
  }

  button:hover:not(.burger) {
    background-color: #ffd700;
  }

  form {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
  }

  #result {
    position: absolute;
    top: calc(50% + 50px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    max-width: 90%;
    padding: 10px;
    background-color: #fff;
    color: #ffd700;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    z-index: 999;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    max-height: 50vh;
    overflow-y: auto;
  }

  nav {
    position: fixed;
    top: 0;
    left: -220px;
    width: 220px;
    height: 100vh;
    background-color: #1f1f1f;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 50px;
    transition: left 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    z-index: 4;
  }

  nav.show {
    left: 0;
  }

  nav a {
    color: #e5cd0b;
    text-decoration: none;
    margin: 2.5px 0;
    padding: 10px 20px;
    font-size: 24px;
    border-radius: 8px;
    transition: background-color 0.3s;
    font-family: Consolas, Arial, sans-serif;
  }

  nav a:hover {
    background-color: #333;
  }

  .burger {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 30px;
    height: 24px;
    background-color: transparent;
    border: none;
    padding: 0;
    transition: left 0.3s ease;
  }

  .burger div {
    width: 30px;
    height: 4px;
    background-color: #e5cd0b;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .burger.active div:nth-child(1) {
    transform: translateY(10px) rotate(45deg);
  }

  .burger.active div:nth-child(2) {
    opacity: 0;
  }

  .burger.active div:nth-child(3) {
    transform: translateY(-10px) rotate(-45deg);
  }

  .menu-show .burger {
    left: 240px;
  }

  .footer {
    position: fixed;
    bottom: 0;
    right: 0;
    padding: 10px;
    text-align: center;
    color: #e5cd0b;
    font-family: Consolas, Arial, sans-serif;
    font-size: 12px;
    background-color: #373b41;
    z-index: 3;
    display: flex;
    align-items: center;
  }

  .footer-icons {
    margin-left: 10px;
  }

  .footer-icon {
    margin-right: 5px;
  }

  .button-container {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  .button-container button {
    margin-right: 5px;
  }

  .button-container button.copy-button {
    margin-top: 10px;
  }
</style>
</head>
<body onload="focusOnTextbox()">
  <button class="burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </button>
  <nav id="menu">
    <a href="https://kyletuck.com">Home</a>
    <a href="food" class="menu-button">Food</a>
    <a href="jobs">Jobs</a>
    <a href="gclinkgenerator">GoCardless</a>
    <a href="customerservice" class="menu-button">One Note</a>
    <a href="private">Private</a>
    <a href="work">Work</a>
  </nav>

  <h2>GoCardless Customer Search</h2>
  <form id="searchForm">
      <label for="email">Enter Email Address:</label><br>
      <input type="text" id="email" name="email" onkeydown="if(event.keyCode==13) generateLink();"><br><br>
      <div class="button-container">
        <button type="button" onclick="pasteAndGenerate()">Paste Email and Generate Link</button>
        <button type="button" onclick="goToLink()">Go to Link</button>
      </div>
      <div class="button-container">
        <button onclick="copyToClipboard()" id="copyButton" disabled class="copy-button">Copy Link</button>
        <button onclick="deleteLink()" class="copy-button">Delete Link</button>
      </div>
  </form>

  <div id="result"></div>

  <footer class="footer">
    <p>&copy; 2024 kyletuck.com. All rights reserved.</p>
    <div class="footer-icons">
      <a href="https://www.instagram.com/kyle_tuck99/" target="_blank"><img src="instagram.png" alt="Instagram" class="footer-icon"></a>
      <a href="https://www.linkedin.com/in/kyle-tuck-667416205" target="_blank"><img src="linkedin.png" alt="LinkedIn" class="footer-icon"></a>
      <a href="https://www.youtube.com/@TuuuckTV" target="_blank"><img src="youtube.png" alt="YouTube" class="footer-icon"></a>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      var menu = document.getElementById('menu');
      menu.classList.toggle('show');
      var burger = document.querySelector('.burger');
      burger.classList.toggle('active');

      if (menu.classList.contains('show')) {
        burger.classList.add('menu-show');
      } else {
        burger.classList.remove('menu-show');
      }
    }

    function pasteAndGenerate() {
      navigator.clipboard.readText()
          .then(text => {
              document.getElementById("email").value = text;
              generateLink(); // Generate link after pasting the email
          })
          .catch(err => {
              console.error('Failed to read clipboard contents: ', err);
          });
    }

    function generateLink() {
      var email = document.getElementById("email").value;
      if (email !== "") {
          var link = "https://manage.gocardless.com/search?query=" + encodeURIComponent(email) + "&resource=customers";
          var resultBox = document.getElementById("result");
          resultBox.textContent = link;
          resultBox.style.display = "block";
          document.getElementById("copyButton").disabled = false;
          setTimeout(resetForm, 30000);
      }
    }

    function copyToClipboard() {
      var link = document.getElementById("result").textContent;
      if (link) {
          var tempInput = document.createElement("input");
          tempInput.value = link;
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand("copy");
          document.body.removeChild(tempInput);
      }
    }

    function resetForm() {
      document.getElementById("searchForm").reset();
      document.getElementById("result").style.display = "none";
      document.getElementById("result").textContent = "";
      document.getElementById("copyButton").disabled = true;
    }

    function goToLink() {
      var link = document.getElementById("result").textContent;
      if (link) {
          window.open(link, "_blank");
      }
    }

    function deleteLink() {
      document.getElementById("result").textContent = "";
      document.getElementById("result").style.display = "none";
      document.getElementById("copyButton").disabled = true;
    }

    function focusOnTextbox() {
      document.getElementById("email").focus();
    }
  </script>
</body>
</html>
