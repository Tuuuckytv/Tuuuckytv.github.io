<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh, Fuck</title>
<link rel="icon" href="spiderman.png" type="image/png">
<style>
  body {
    background-color: #373b41;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    font-family: Consolas, Arial, sans-serif; /* Change font to Consolas */
    color: #e5cd0b;
  }

  nav {
    position: fixed;
    top: 0;
    left: -220px; /* Initially hide the menu off-screen */
    width: 220px; /* Increased width for better appearance */
    height: 100vh;
    background-color: #1f1f1f; /* Dark background color */
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* Align items at the top */
    align-items: center;
    padding-top: 50px; /* Add padding to align menu items vertically */
    transition: left 0.3s ease; /* Add transition for smooth animation */
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* Add box shadow for depth */
    z-index: 4; /* Ensure the menu is on top of other elements */
  }

  nav.show {
    left: 0; /* Show the menu by bringing it to the screen */
  }

  nav a {
    color: #e5cd0b;
    text-decoration: none;
    margin: 2.5px 0;
    padding: 10px 20px;
    font-size: 24px;
    border-radius: 8px; /* Rounded corners for buttons */
    transition: background-color 0.3s; /* Smooth transition for hover effect */
    font-family: Consolas, Arial, sans-serif; /* Change font to Consolas */
  }

  nav a:hover {
    background-color: #333; /* Darken background on hover */
  }

  .burger {
    position: fixed;
    top: 20px;
    left: 20px; /* Adjusted position on the same side as the menu */
    z-index: 9999;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 30px;
    height: 24px;
    background-color: transparent;
    border: none;
    padding: 0;
    transition: left 0.5s ease; /* Add transition for smooth animation */
  }

  .burger div {
    width: 30px;
    height: 4px;
    background-color: #e5cd0b;
    transition: all 0.3s ease; /* Add transition for smooth animation */
    border-radius: 2px; /* Rounded corners for burger lines */
  }

  .burger.active div:nth-child(1) {
    transform: translateY(10px) rotate(45deg);
  }
  
  .burger:hover {
  background-color: transparent; /* Set hover background color to match the original background */
}

  .burger.active div:nth-child(2) {
    opacity: 0;
  }

  .burger.active div:nth-child(3) {
    transform: translateY(-10px) rotate(-45deg);
  }

  /* Modal Styles */
  .modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #1f1f1f;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    z-index: 3;
    animation: fadeIn 1s ease forwards; /* Add fadeIn animation */
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  .modal-content {
    text-align: center;
    margin-bottom: 20px;
  }

  .modal-input {
    padding: 10px;
    margin: 10px;
    width: 200px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  .modal-button {
    padding: 10px 20px;
    background-color: #717579;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
    font-family: Consolas, Arial, sans-serif;
  }

  .modal-button:hover {
    background-color: #5a5d60;
  }

  /* Lock Icon Styles */
  #lockIcon {
    display: none; /* Initially hide the lock button */
    position: fixed;
    top: 20px;
    right: 20px;
    width: 30px;
    height: auto;
    cursor: pointer;
    z-index: 9999;
  }

  footer {
    position: fixed;
    bottom: 0;
    right: 0;
    padding: 10px;
    color: #e5cd0b;
    font-family: Consolas, Arial, sans-serif;
    font-size: 12px;
    display: flex; /* Add display flex */
    align-items: center; /* Align items vertically */
  }

  .footer-icon {
    margin-right: 5px; /* Add space between icons */
  }
</style>
</head>
<body>
  <button class="burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </button>
  <nav id="menu">
    <a href="https://kyletuck.com">Home</a>
        <a href="food" class="menu-button">Food</a>
        <a href="jobs">Jobs</a>
        <a href="fuckcustomerservice" class="menu-button">One Note</a>
        <a href="private">Private</a>
        <a href="social">Social</a>
        <a href="work">Work</a>
  </nav>

  <footer>
    <p>&copy; 2024 kyletuck.com. All rights reserved.</p>
    <div class="footer-icons">
      <a href="https://www.instagram.com/kyle_tuck99/" target="_blank"><img src="instagram.png" alt="Instagram" class="footer-icon"></a>
      <a href="https://www.linkedin.com/in/kyle-tuck-667416205" target="_blank"><img src="linkedin.png" alt="LinkedIn" class="footer-icon"></a>
      <a href="https://www.youtube.com/@TuuuckTV" target="_blank"><img src="youtube.png" alt="YouTube" class="footer-icon"></a>
    </div>
  </footer>

  <!-- Modal -->
  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h2>Password Required</h2>
      <input type="password" id="passwordInput" class="modal-input" placeholder="Enter Password" autofocus onkeydown="if (event.keyCode == 13) checkPassword()">
      <br>
      <button onclick="checkPassword()" class="modal-button">Submit</button>
    </div>
  </div>

  <!-- Lock Icon -->
  <img src="lock.png" id="lockIcon" alt="Lock" onclick="lockPage()">

  <script>
    function toggleMenu() {
      var menu = document.getElementById('menu');
      menu.classList.toggle('show');
      var burger = document.querySelector('.burger');
      burger.classList.toggle('active');
    }

    var modal = document.getElementById('passwordModal');
    var passwordInput = document.getElementById('passwordInput');
    var idleTimer;

    // Show modal when page is loaded
    window.onload = function() {
      showModal();
      startIdleTimer();
    };

    // Show modal
    function showModal() {
      modal.style.display = 'block';
      passwordInput.focus(); // Set focus to the password input field
    }

    // Check password
    function checkPassword() {
      var password = passwordInput.value;
      if (password === 'Jeff123199!') {
        closeModal();
        showLockButton(); // Call function to show the lock button
      } else {
        window.location.href = 'https://kyletuck.com';
      }
    }

    // Show lock button
    function showLockButton() {
      var lockIcon = document.getElementById('lockIcon');
      lockIcon.style.display = 'block'; // Show the lock button
    }

    // Close modal
    function closeModal() {
      modal.style.display = 'none';
      clearTimeout(idleTimer);
    }

    // Idle timeout
    function startIdleTimer() {
      idleTimer = setTimeout(showModal, 120000); // 2 minutes (120000 milliseconds)
    }

    // Reset idle timeout on user activity
    document.addEventListener('mousemove', resetIdleTimer);
    document.addEventListener('keypress', resetIdleTimer);

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      startIdleTimer();
    }

    // Lock page
    function lockPage() {
      window.location.reload();
    }
  </script>
</body>
</html>
