<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh,Fuck</title>
    <link rel="icon" href="spiderman.png" type="image/png">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: black;
            background-color: #F1F5F9;
            position: relative;
        }

        nav {
            position: fixed;
            top: 0;
            left: -220px;
            width: 220px;
            height: 100vh;
            background-color: #01A0C0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 50px;
            transition: left 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            z-index: 4;
        }

        nav.show {
            left: 0;
        }

        nav a {
            color: #F1F5F9;
            text-decoration: none;
            margin: 10px 0;
            padding: 10px 20px;
            font-size: 24px;
            border-radius: 8px;
            transition: background-color 0.3s;
            font-family: Arial, sans-serif;
        }

        nav a:hover {
            background-color: #028090;
        }

        .burger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 24px;
            background-color: transparent;
            border: none;
            padding: 0;
            transition: left 0.3s ease;
        }

        .burger div {
            width: 30px;
            height: 4px;
            background-color: #EC008C;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .burger.active div:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }

        .burger.active div:nth-child(2) {
            opacity: 0;
        }

        .burger.active div:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
        }

        /* Countdown timer styles */
        .header {
            background-color: #01A0C0;
            color: white;
            padding: 30px;
            font-size: 24px;
            width: 100%;
            text-align: center;
            position: fixed;
            top: 0;
            height: auto;
        }

        .header img {
            display: inline;
            vertical-align: middle;
            margin-right: 10px;
            height: 30px;
        }

        .countdown-timers {
            margin-top: -70px; /* Adjusted margin top */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .countdown-timer {
            background-color: #EC008C;
            color: white;
            border-radius: 5px;
            padding: 10px;
            font-size: 20px;
            text-align: center;
            transition: background-color 0.5s;
        }

        .countdown-label {
            font-size: 18px;
            margin-top: 10px;
            color: black;
        }

        .button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #01A0C0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            text-decoration: none;
        }

        /* Media Query for Mobile Devices */
        @media screen and (max-width: 768px) {
            .header {
                font-size: 20px;
                padding: 15px;
            }

            .header img {
                height: 20px;
            }

            .countdown-timer {
                font-size: 16px;
                padding: 8px;
            }

            .countdown-label {
                font-size: 14px;
            }

            .button {
                bottom: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="burger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </button>
    <nav id="menu">
        <a href="https://kyletuck.com">Home</a>
        <a href="food" class="menu-button">Food</a>
        <a href="goodbye">Goodbye</a>
        <a href="private">Private</a>
        <a href="work">Work</a>
    </nav>

    <div class="header">
        <img src="spiderman.png" alt="Spider Image" style="height: 30px;"> Delivery cut-off
    </div>
    <div class="countdown-timers">
        <div>
            <div class="countdown-label">DPD Next Day Cut-Off</div>
            <div class="countdown-timer" id="dpdCountdown">00h 00m 00s</div>
        </div>
        <div>
            <div class="countdown-label">Royal Mail Express Cut-Off</div>
            <div class="countdown-timer" id="rmCountdown">00h 00m 00s</div>
        </div>
        <div>
            <div class="countdown-label">Special Delivery Cut-Off</div>
            <div class="countdown-timer" id="specialCountdown">00h 00m 00s</div>
        </div>
    </div>

    <a class="button" href="https://youtu.be/dQw4w9WgXcQ?si=a0MVje-KSEOEXOJP" target="_blank">Learn More</a>

    <script>
        function toggleMenu() {
            var menu = document.getElementById('menu');
            menu.classList.toggle('show');
            var burger = document.querySelector('.burger');
            burger.classList.toggle('active');
            
            var offset = menu.classList.contains('show') ? 220 : 0;
            burger.style.left = `${20 + offset}px`;
        }

        function updateCountdown(endTime, countdownElement) {
            const now = new Date().getTime();
            let distance = endTime - now;

            if (distance < 0) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(endTime.getUTCHours(), endTime.getUTCMinutes(), endTime.getUTCSeconds(), 0);
                distance = tomorrow - now;
            }

            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownElement.textContent = `${hours}h ${minutes}m ${seconds}s`;

            if (hours === 0 && minutes === 0 && seconds === 0) {
                countdownElement.style.backgroundColor = "red";
                setTimeout(() => {
                    countdownElement.style.backgroundColor = "#EC008C";
                }, 1000);
            }
        }

        const dpdEndTime = new Date();
        dpdEndTime.setUTCHours(17, 0, 0, 0);
        const rmEndTime = new Date();
        rmEndTime.setUTCHours(19, 0, 0, 0);

        setInterval(function () {
            updateCountdown(dpdEndTime, document.getElementById("dpdCountdown"));
            updateCountdown(rmEndTime, document.getElementById("rmCountdown"));
            updateSpecialCountdown();
        }, 1000);

        function updateSpecialCountdown() {
            const now = new Date();
            let specialEndTime = new Date(now);
            if (now.getUTCHours() >= 13) {
                specialEndTime.setDate(now.getDate() + 1);
            }
            specialEndTime.setUTCHours(13, 0, 0, 0);

            updateCountdown(specialEndTime, document.getElementById("specialCountdown"));
        }
    </script>
</body>
</html>
