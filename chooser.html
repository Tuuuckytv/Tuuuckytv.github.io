<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Choose or Die</title>
<link rel="icon" href="spiderman.png" type="image/png">

<style>
:root{color-scheme:dark;}
*{box-sizing:border-box;}

body{
background:#000;
color:#28ed00;
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

.wrap{
width:min(900px,92vw);
display:flex;
flex-direction:column;
align-items:center;
gap:22px;
}

/* INPUT */

#inputStage{
width:min(720px,92vw);
display:flex;
flex-direction:column;
gap:12px;
}

textarea{
width:100%;
min-height:180px;
padding:14px;
font-size:16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.18);
background:rgba(255,255,255,.06);
color:#fff;
resize:none;
outline:none;
}

/* BUTTONS */

button{
padding:14px 18px;
font-size:16px;
font-weight:700;
border-radius:12px;
border:none;
cursor:pointer;
}

.primary{background:#2563eb;color:#fff;}
.secondary{background:rgba(255,255,255,.12);color:#fff;}

.hidden{display:none!important;}

/* NAV */

#homeBtn{
position:fixed;
top:12px;
left:12px;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,.12);
color:#28ed00;
border:1px solid rgba(40,237,0,.35);
z-index:20;
}

#editBtn{
position:fixed;
top:12px;
left:110px;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,.12);
color:#fff;
z-index:19;
}

/* SLOT RESULT */

.slot{
width:min(900px,92vw);
height:90px;
overflow:hidden;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.reel{
position:absolute;
top:0;
left:0;
width:100%;
will-change:transform;
}

.reel-item{
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(42px,8vw,82px);
font-weight:900;
line-height:1;
color:#28ed00;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
padding:0 16px;
text-shadow:
0 0 10px rgba(40,237,0,.35),
0 0 22px rgba(40,237,0,.18);
}

.spinning .reel-item{
filter:blur(1.3px);
}

.reel-item.blank{
opacity:0;
pointer-events:none;
}

.slot.locked .reel-item.final{
animation:finalClick 220ms cubic-bezier(.2,.9,.3,1);
}

@keyframes finalClick{
0%{
transform:translateY(-6px) scale(.985);
}
65%{
transform:translateY(2px) scale(1.02);
}
100%{
transform:translateY(0) scale(1);
}
}

/* SMALLER SIDEWAYS SLIDER */

#launcherWrap{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
user-select:none;
touch-action:none;
}

#launcher{
width:280px;
max-width:80vw;
height:52px;
border-radius:999px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
position:relative;
overflow:hidden;
display:flex;
align-items:center;
}

#launcherGlow{
position:absolute;
inset:0;
pointer-events:none;
background:linear-gradient(
to right,
rgba(40,237,0,.03),
rgba(40,237,0,.08),
rgba(40,237,0,.03)
);
}

#launcherKnob{
width:44px;
height:44px;
border-radius:999px;
background:
radial-gradient(circle at 35% 30%, #b7ff9f 0%, #58ff1a 28%, #28ed00 58%, #139100 100%);
box-shadow:
0 0 14px rgba(40,237,0,.35),
inset 0 2px 6px rgba(255,255,255,.28),
inset 0 -6px 10px rgba(0,0,0,.35);
position:absolute;
left:4px;
top:50%;
transform:translateY(-50%);
cursor:grab;
}

#launcherKnob:active{cursor:grabbing;}

#power{
font-size:13px;
color:#28ed00;
min-height:1em;
}

</style>
</head>

<body>

<button id="homeBtn" onclick="location.href='personal'">Home</button>

<div class="wrap">

<section id="inputStage">
<textarea id="options" placeholder="Enter options (one per line or comma-separated)"></textarea>
<button id="submitBtn" class="primary">Submit</button>
</section>

<section id="resultStage" class="hidden">

<button id="editBtn" class="secondary">Edit list</button>

<div class="slot">
<div id="reel" class="reel"></div>
</div>

<div id="launcherWrap">
<div id="launcher">
<div id="launcherGlow"></div>
<div id="launcherKnob"></div>
</div>
<div id="power">0%</div>
</div>

</section>

</div>

<script>
const ITEM_HEIGHT=90;
const MAX_CHARS=40;

const MIN_SPIN_LOOPS=6;
const MAX_SPIN_LOOPS=28;
const MIN_SPIN_DURATION=1400;
const MAX_SPIN_DURATION=7000;

const SLIDER_TRAVEL=210;

const inputStage=document.getElementById("inputStage");
const resultStage=document.getElementById("resultStage");

const textarea=document.getElementById("options");
const submitBtn=document.getElementById("submitBtn");
const editBtn=document.getElementById("editBtn");

const reel=document.getElementById("reel");
const slot=document.querySelector(".slot");

const launcher=document.getElementById("launcher");
const knob=document.getElementById("launcherKnob");
const powerText=document.getElementById("power");

let options=[];
let spinning=false;

let dragging=false;
let startX=0;
let pull=0;

function parseOptions(raw){
  const parts=raw
    .split(/[\n,]+/)
    .map(s=>s.trim().slice(0,MAX_CHARS))
    .filter(Boolean);

  return [...new Set(parts.map(p=>p.toLowerCase()))]
    .map(k=>parts.find(p=>p.toLowerCase()===k));
}

function randIndex(len){
  if(crypto?.getRandomValues){
    const u=new Uint32Array(1);
    crypto.getRandomValues(u);
    return u[0]%len;
  }
  return Math.floor(Math.random()*len);
}

function shuffle(arr){
  const copy=[...arr];

  for(let i=copy.length-1;i>0;i--){
    const j=randIndex(i+1);
    [copy[i],copy[j]]=[copy[j],copy[i]];
  }

  return copy;
}

function clearReel(){
  reel.innerHTML="";
  reel.style.transition="none";
  reel.style.transform="translateY(0)";
  slot.classList.remove("spinning","locked");
}

function buildFinalWinner(winner){
  clearReel();

  const items=["",winner,""];

  items.forEach((text,index)=>{
    const d=document.createElement("div");
    d.className="reel-item";
    if(!text){
      d.classList.add("blank");
      d.innerHTML="&nbsp;";
    }else{
      d.classList.add("final");
      d.textContent=text;
    }
    reel.appendChild(d);
  });

  reel.style.transform=`translateY(-${ITEM_HEIGHT}px)`;

  void reel.offsetHeight;
  slot.classList.add("locked");
}

function submitList(){
  options=parseOptions(textarea.value);

  if(!options.length){
    alert("Add at least one option");
    return;
  }

  inputStage.classList.add("hidden");
  resultStage.classList.remove("hidden");

  clearReel();
  resetSlider();
}

function resetSlider(){
  pull=0;
  knob.style.transition="transform .15s ease";
  knob.style.transform="translate(0,-50%)";
  powerText.textContent="0%";
}

function updateSlider(px){
  pull=Math.max(0,Math.min(SLIDER_TRAVEL,px));

  knob.style.transition="none";
  knob.style.transform=`translate(${pull}px,-50%)`;

  const pct=Math.round((pull/SLIDER_TRAVEL)*100);
  powerText.textContent=pct+"%";
}

function spin(power){
  if(spinning||!options.length)return;

  spinning=true;
  slot.classList.remove("locked");

  const loops=Math.round(MIN_SPIN_LOOPS+(MAX_SPIN_LOOPS-MIN_SPIN_LOOPS)*power);
  const duration=Math.round(MIN_SPIN_DURATION+(MAX_SPIN_DURATION-MIN_SPIN_DURATION)*power);

  const winner=options[randIndex(options.length)];

  const sequence=[""];

  for(let i=0;i<loops;i++){
    sequence.push(...shuffle(options));
  }

  sequence.push(...shuffle(options));
  sequence.push(winner);
  sequence.push("");

  clearReel();

  sequence.forEach(text=>{
    const d=document.createElement("div");
    d.className="reel-item";

    if(text===""){
      d.classList.add("blank");
      d.innerHTML="&nbsp;";
    }else{
      d.textContent=text;
    }

    reel.appendChild(d);
  });

  slot.classList.add("spinning");

  reel.style.transform="translateY(0)";
  void reel.offsetHeight;

  const winnerIndex=sequence.length-2;
  const finalY=-(winnerIndex*ITEM_HEIGHT);

  reel.style.transition=`transform ${duration}ms cubic-bezier(.12,.82,.18,1)`;
  reel.style.transform=`translateY(${finalY}px)`;

  const done=()=>{
    reel.removeEventListener("transitionend",done);
    slot.classList.remove("spinning");

    buildFinalWinner(winner);

    spinning=false;
    resetSlider();
  };

  reel.addEventListener("transitionend",done,{once:true});
}

knob.addEventListener("pointerdown",e=>{
  if(spinning)return;
  dragging=true;
  startX=e.clientX-pull;
  knob.setPointerCapture(e.pointerId);
});

window.addEventListener("pointermove",e=>{
  if(!dragging)return;
  updateSlider(e.clientX-startX);
});

window.addEventListener("pointerup",()=>{
  if(!dragging)return;
  dragging=false;

  const ratio=pull/SLIDER_TRAVEL;

  knob.style.transition="transform .1s ease";
  knob.style.transform="translate(0,-50%)";

  if(ratio>0.05)spin(ratio);
  else resetSlider();
});

submitBtn.onclick=submitList;

editBtn.onclick=()=>{
  resultStage.classList.add("hidden");
  inputStage.classList.remove("hidden");

  clearReel();
  resetSlider();

  textarea.focus();
};

window.onload=()=>textarea.focus();
</script>

</body>
</html>
