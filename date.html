<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Checker</title>
  <link rel="icon" href="pipe.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #070812;
      --bg-2: #11152a;
      --screen: rgba(9, 18, 30, 0.88);
      --screen-soft: rgba(14, 31, 47, 0.72);
      --cyan: #00f5ff;
      --cyan-soft: rgba(0, 245, 255, 0.25);
      --lime: #a8ff60;
      --amber: #ffd166;
      --pink: #ff2fd6;
      --red: #ff3131;
      --text: #d8fff7;
      --muted: #8db9b8;
      --shadow-cyan: 0 0 8px rgba(0, 245, 255, 0.8), 0 0 24px rgba(0, 245, 255, 0.28);
      --shadow-pink: 0 0 8px rgba(255, 47, 214, 0.8), 0 0 24px rgba(255, 47, 214, 0.28);
      --scanline: rgba(255, 255, 255, 0.045);
      --pixel: 4px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 104px 24px 72px;
      color: var(--text);
      font-family: 'Share Tech Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 47, 214, 0.2), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(0, 245, 255, 0.2), transparent 32%),
        radial-gradient(circle at 50% 80%, rgba(168, 255, 96, 0.11), transparent 38%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 58%, #090714);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    body::before {
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.055) 0,
          rgba(255, 255, 255, 0.055) 1px,
          transparent 1px,
          transparent 4px
        );
      mix-blend-mode: overlay;
      opacity: 0.55;
      animation: scanMove 7s linear infinite;
    }

    body::after {
      background:
        linear-gradient(rgba(255, 255, 255, 0.025), transparent 9%, transparent 91%, rgba(0, 0, 0, 0.34)),
        radial-gradient(circle at 50% 50%, transparent 0 58%, rgba(0, 0, 0, 0.48) 100%);
    }

    @keyframes scanMove {
      from { transform: translateY(0); }
      to { transform: translateY(16px); }
    }

    .retro-grid {
      position: fixed;
      inset: auto -10vw -26vh -10vw;
      height: 48vh;
      transform: perspective(680px) rotateX(62deg);
      transform-origin: bottom center;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 47, 214, 0.18) 1px, transparent 1px);
      background-size: 48px 48px;
      filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.28));
      opacity: 0.62;
      animation: gridDrive 9s linear infinite;
      z-index: 0;
    }

    @keyframes gridDrive {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 96px, 96px 0; }
    }

    .orb {
      position: fixed;
      width: min(42vw, 520px);
      aspect-ratio: 1;
      top: 8vh;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 209, 102, 0.9) 0 8px,
          rgba(255, 112, 166, 0.78) 8px 18px,
          transparent 18px 30px
        );
      box-shadow: 0 0 40px rgba(255, 47, 214, 0.28), 0 0 90px rgba(255, 209, 102, 0.18);
      opacity: 0.22;
      filter: blur(0.2px);
      z-index: 0;
    }

    .date-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .date-chip {
      position: absolute;
      width: 74px;
      height: 52px;
      border: 1px solid rgba(0, 245, 255, 0.45);
      background: rgba(4, 14, 22, 0.42);
      box-shadow: 0 0 16px rgba(0, 245, 255, 0.12);
      color: rgba(216, 255, 247, 0.42);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      display: grid;
      place-items: center;
      animation: dateFloat linear infinite;
      opacity: 0.58;
    }

    .date-chip::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 9px;
      background: linear-gradient(90deg, var(--pink), var(--cyan), var(--lime));
      opacity: 0.8;
    }

    @keyframes dateFloat {
      from { transform: translateY(110vh) rotate(-5deg); }
      to { transform: translateY(-130px) rotate(5deg); }
    }

    .button {
      appearance: none;
      border: 2px solid var(--cyan);
      border-radius: 0;
      color: var(--text);
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(0, 245, 255, 0.13), rgba(255, 47, 214, 0.08)),
        rgba(2, 7, 17, 0.86);
      padding: 15px 15px;
      min-height: 52px;
      position: relative;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2.2vw, 11px);
      line-height: 1.5;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: 6px 6px 0 rgba(0, 245, 255, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      z-index: 1;
    }

    .button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      transform: translateX(-115%);
      transition: transform 0.45s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translate(-3px, -3px);
      border-color: var(--pink);
      color: var(--lime);
      box-shadow: 9px 9px 0 rgba(255, 47, 214, 0.28), 0 0 20px rgba(255, 47, 214, 0.25);
      outline: none;
    }

    .button:hover::before,
    .button:focus-visible::before {
      transform: translateX(115%);
    }

    .button:active {
      transform: translate(0, 0);
      box-shadow: 4px 4px 0 rgba(0, 245, 255, 0.18);
    }

    .top-buttons {
      position: fixed;
      top: 16px;
      left: 15px;
      display: flex;
      gap: 10px;
      z-index: 70;
      flex-wrap: wrap;
    }

    .toggle-container {
      position: fixed;
      top: 16px;
      right: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 70;
      padding: 13px 14px;
      border: 2px solid rgba(0, 245, 255, 0.86);
      background: rgba(4, 14, 22, 0.84);
      box-shadow: var(--shadow-cyan), inset 0 0 20px rgba(0, 245, 255, 0.08);
    }

    .toggle-container::before {
      content: "RETURN MODE";
      position: absolute;
      top: -12px;
      left: 12px;
      padding: 0 7px;
      background: #07101b;
      color: var(--amber);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 1px;
    }

    .toggle-container {
      flex-direction: column;
      align-items: stretch;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-container span {
      font-weight: 700;
      font-size: 17px;
      color: var(--muted);
      transition: color 0.15s ease;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .switch {
      --switch_width: 2.7em;
      --switch_height: 1.35em;
      --thumb_color: var(--text);
      --track_color: rgba(141, 185, 184, 0.25);
      --track_active_color: var(--lime);
      --outline_color: var(--cyan);
      font-size: 18px;
      position: relative;
      display: inline-block;
      width: var(--switch_width);
      height: var(--switch_height);
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      box-sizing: border-box;
      border: 2px solid var(--outline_color);
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: var(--track_color);
      transition: 0.15s;
      border-radius: 0;
      box-shadow: inset 0 0 14px rgba(0, 245, 255, 0.16);
    }

    .slider:before {
      box-sizing: border-box;
      position: absolute;
      content: "";
      height: calc(var(--switch_height) - 8px);
      width: calc(var(--switch_height) - 8px);
      border: 0;
      border-radius: 0;
      left: 4px;
      bottom: 4px;
      background-color: var(--thumb_color);
      box-shadow: 0 0 10px rgba(216, 255, 247, 0.44);
      transition: 0.15s;
    }

    input:checked + .slider {
      background-color: rgba(168, 255, 96, 0.26);
      border-color: var(--lime);
      box-shadow: 0 0 14px rgba(168, 255, 96, 0.38), inset 0 0 12px rgba(168, 255, 96, 0.18);
    }

    input:checked + .slider:before {
      transform: translateX(calc(var(--switch_width) - var(--switch_height)));
      background-color: var(--lime);
      box-shadow: 0 0 16px rgba(168, 255, 96, 0.65);
    }

    input:focus-visible + .slider {
      outline: 2px solid var(--pink);
      outline-offset: 4px;
    }

    #container {
      width: min(92vw, 650px);
      position: relative;
      z-index: 10;
      padding: clamp(28px, 6vw, 48px);
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        var(--screen);
      border: 2px solid var(--cyan);
      box-shadow:
        var(--shadow-cyan),
        inset 0 0 32px rgba(0, 245, 255, 0.09),
        12px 12px 0 rgba(255, 47, 214, 0.25);
      animation: powerOn 0.85s cubic-bezier(.19,1,.22,1) both;
    }

    #container::before {
      content: "KYLE_OS // DATE MODULE";
      position: absolute;
      top: -15px;
      left: 18px;
      padding: 0 10px;
      background: #08101c;
      color: var(--amber);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 1.9vw, 12px);
      letter-spacing: 1px;
    }

    #container::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(168, 255, 96, 0.25);
      pointer-events: none;
    }

    @keyframes powerOn {
      0% { opacity: 0; transform: scaleY(0.02) translateY(12px); filter: brightness(3); }
      45% { opacity: 1; transform: scaleY(1.06) translateY(0); filter: brightness(1.4); }
      100% { opacity: 1; transform: scaleY(1) translateY(0); filter: brightness(1); }
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--lime);
      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(168, 255, 96, 0.52);
    }

    h2 {
      margin: 0 0 18px;
      color: var(--cyan);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.45rem, 5.8vw, 3.15rem);
      line-height: 1.28;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow:
        3px 0 0 rgba(255, 47, 214, 0.75),
        -3px 0 0 rgba(168, 255, 96, 0.55),
        0 0 18px rgba(0, 245, 255, 0.58);
      animation: microGlitch 4.8s infinite steps(1);
    }

    @keyframes microGlitch {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(-2px, 1px); }
      92% { transform: translate(2px, -1px); }
      93% { transform: translate(-1px, -1px); }
      94% { transform: translate(0); }
    }

    .lead {
      width: min(100%, 500px);
      margin: 0 auto 26px;
      color: var(--muted);
      font-size: clamp(16px, 3.2vw, 20px);
      line-height: 1.45;
    }

    .date-shell {
      width: min(100%, 500px);
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .input-wrap {
      position: relative;
      margin-top: 4px;
    }

    .input-wrap::before {
      content: ">";
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      color: var(--lime);
      text-shadow: 0 0 10px rgba(168, 255, 96, 0.7);
      z-index: 2;
      font-size: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 16px 16px 42px;
      border: 2px solid rgba(0, 245, 255, 0.86);
      border-radius: 0;
      outline: none;
      color: var(--text);
      background: rgba(4, 14, 22, 0.84);
      box-shadow: var(--shadow-cyan), inset 0 0 20px rgba(0, 245, 255, 0.08);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(18px, 4vw, 23px);
      letter-spacing: 0.08em;
      caret-color: var(--lime);
      text-align: center;
      text-transform: uppercase;
    }

    input[type="text"]::placeholder {
      color: rgba(216, 255, 247, 0.45);
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }

    input[type="text"]:focus {
      border-color: var(--pink);
      box-shadow: var(--shadow-pink), inset 0 0 22px rgba(255, 47, 214, 0.08);
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    #output {
      margin: 26px auto 0;
      width: min(100%, 500px);
      font-size: clamp(18px, 3.6vw, 23px);
      font-weight: 700;
      color: var(--lime);
      line-height: 1.55;
      background:
        linear-gradient(180deg, rgba(168, 255, 96, 0.08), rgba(0, 245, 255, 0.05)),
        rgba(4, 14, 22, 0.84);
      padding: 16px;
      border: 2px solid rgba(168, 255, 96, 0.72);
      min-height: 62px;
      display: none;
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
      box-shadow:
        0 0 12px rgba(168, 255, 96, 0.26),
        inset 0 0 22px rgba(168, 255, 96, 0.06);
      position: relative;
      z-index: 2;
      text-shadow: 0 0 10px rgba(168, 255, 96, 0.35);
    }

    #output::before {
      content: "RESULT";
      position: absolute;
      top: -12px;
      left: 14px;
      padding: 0 8px;
      background: #07101b;
      color: var(--amber);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      text-shadow: none;
    }

    #output.show {
      display: block;
      opacity: 1;
      animation: resultGlitch 0.25s steps(3, end) both;
    }

    @keyframes resultGlitch {
      0% { transform: translateX(-4px); filter: hue-rotate(30deg); }
      45% { transform: translateX(4px); }
      100% { transform: translateX(0); filter: none; }
    }

    .status-strip {
      margin: 28px auto 0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      width: min(100%, 500px);
      color: rgba(216, 255, 247, 0.62);
      font-size: 14px;
      border-top: 1px solid rgba(0, 245, 255, 0.24);
      padding-top: 14px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .status-strip span:last-child {
      color: var(--amber);
    }

    footer {
      position: fixed;
      right: 16px;
      bottom: 12px;
      z-index: 60;
      color: rgba(216, 255, 247, 0.56);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      body {
        align-items: flex-start;
        overflow: auto;
        padding: 152px 18px 72px;
      }

      .top-buttons {
        top: 12px;
        left: 12px;
        right: 12px;
        gap: 8px;
      }

      .button {
        padding: 13px 12px;
        min-height: 48px;
      }

      .toggle-container {
        top: 76px;
        left: 12px;
        right: auto;
        padding: 12px;
      }

      #container {
        box-shadow:
          var(--shadow-cyan),
          inset 0 0 32px rgba(0, 245, 255, 0.09),
          7px 7px 0 rgba(255, 47, 214, 0.22);
      }

      .status-strip {
        flex-direction: column;
        align-items: flex-start;
      }

      footer {
        left: 14px;
        right: auto;
      }
    }

    @media (max-width: 420px) {
      .toggle-container span {
        font-size: 15px;
      }

      #container {
        padding: 28px 18px 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  
    /* Title boot animation helpers */
    h2.kt-title-scrambling {
      white-space: normal;
    }

  </style>
</head>

<body>
  <div class="orb" aria-hidden="true"></div>
  <div class="retro-grid" aria-hidden="true"></div>
  <div class="date-rain" aria-hidden="true">
    <span class="date-chip" style="left: 7%; animation-duration: 21s; animation-delay: -12s;">07/30</span>
    <span class="date-chip" style="left: 21%; animation-duration: 25s; animation-delay: -18s;">14/30</span>
    <span class="date-chip" style="left: 42%; animation-duration: 19s; animation-delay: -6s;">21/30</span>
    <span class="date-chip" style="left: 66%; animation-duration: 27s; animation-delay: -22s;">30/30</span>
    <span class="date-chip" style="left: 84%; animation-duration: 23s; animation-delay: -9s;">EXP</span>
  </div>

  <div class="top-buttons">
    <button class="button" onclick="location.href='/'">Home</button>
    <button class="button" onclick="location.href='date'">Dates</button>
    <button class="button" onclick="location.href='pipes'">Pipe Formatter</button>
  </div>

  <div class="toggle-container">
    <div class="toggle-row">
      <span id="returnToggleText">Doing returns</span>
      <label class="switch" for="orderToggle" tabindex="0">
        <input type="checkbox" id="orderToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span id="totalDaysToggleText">Tom cried now this exists</span>
      <label class="switch" for="totalDaysToggle" tabindex="0">
        <input type="checkbox" id="totalDaysToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <main id="container" aria-label="Date checker module">
    <p class="eyebrow">Date core online</p>
    <h2>Enter Date</h2>
    <p class="lead">Type a date to calculate time passed, return mode, and expiry status.</p>

    <div class="date-shell">
      <div class="input-wrap">
        <input type="text" id="birthInput" placeholder="dd - mm - yyyy" />
      </div>

      <div class="action-row">
        <button class="button" onclick="clearInput()">Clear</button>
      </div>
    </div>

    <div id="output"></div>

    <div class="status-strip" aria-hidden="true">
      <span>DATE MODULE // READY</span>
      <span id="clockText">00:00:00</span>
    </div>
  </main>

  <footer>Kyle Tuck Inc.</footer>

  <script>
const input = document.getElementById("birthInput");
    const orderToggle = document.getElementById("orderToggle");
    const totalDaysToggle = document.getElementById("totalDaysToggle");
    const switchLabels = document.querySelectorAll('.switch');
    const toggleText = document.getElementById('returnToggleText');
    const totalDaysToggleText = document.getElementById('totalDaysToggleText');
    const output = document.getElementById("output");

    function updateToggleUI(state) {
      toggleText.textContent = state ? 'Returns: ON' : 'Returns: OFF';
      toggleText.style.color = state ? 'var(--lime)' : 'var(--muted)';
    }

    function triggerVibration() {
      if ('vibrate' in navigator) navigator.vibrate(20);
    }

    function updateTotalDaysToggleUI(state) {
      totalDaysToggleText.style.color = state ? 'var(--lime)' : 'var(--muted)';
    }

    function refocusDateInput() {
      requestAnimationFrame(() => {
        input.focus({ preventScroll: true });
        const caretPosition = input.value.length;
        input.setSelectionRange(caretPosition, caretPosition);
      });
    }

    function onToggleStateChange() {
      const state = orderToggle.checked;
      updateToggleUI(state);
      localStorage.setItem('toggleState', state);
      triggerVibration();
      calculateAge();
      refocusDateInput();
    }

    function onTotalDaysToggleStateChange() {
      const state = totalDaysToggle.checked;
      updateTotalDaysToggleUI(state);
      localStorage.setItem('totalDaysToggleState', state);
      triggerVibration();
      calculateAge();
      refocusDateInput();
    }

    function loadInitialState() {
      const savedState = localStorage.getItem('toggleState') === 'true';
      const savedTotalDaysState = localStorage.getItem('totalDaysToggleState') === 'true';
      orderToggle.checked = savedState;
      totalDaysToggle.checked = savedTotalDaysState;
      updateToggleUI(savedState);
      updateTotalDaysToggleUI(savedTotalDaysState);
      input.focus();
      calculateAge();
    }

    window.addEventListener('load', loadInitialState);
    orderToggle.addEventListener('change', onToggleStateChange);
    totalDaysToggle.addEventListener('change', onTotalDaysToggleStateChange);

    input.addEventListener("input", () => {
      let val = input.value.replace(/\D/g, "").slice(0, 8);
      let formatted = "";

      if (val.length >= 1) formatted += val.slice(0, 2);
      if (val.length >= 3) formatted += " - " + val.slice(2, 4);
      else if (val.length > 2) formatted += " - ";

      if (val.length >= 5) formatted += " - " + val.slice(4);
      else if (val.length > 4) formatted += " - ";

      input.value = formatted;
      calculateAge();
    });

    input.addEventListener("paste", (e) => {
      e.preventDefault();
      let pasted = (e.clipboardData || window.clipboardData).getData("text");
      pasted = pasted.replace(/\D/g, "").slice(0, 8);
      let formatted = "";
      if (pasted.length >= 1) formatted += pasted.slice(0, 2);
      if (pasted.length >= 3) formatted += " - " + pasted.slice(2, 4);
      if (pasted.length >= 5) formatted += " - " + pasted.slice(4);
      input.value = formatted;
      calculateAge();
    });

    switchLabels.forEach((switchLabel) => {
      switchLabel.addEventListener('pointerdown', (e) => {
        e.preventDefault();
      });

      switchLabel.addEventListener('click', () => {
        refocusDateInput();
      });

      switchLabel.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const checkbox = switchLabel.querySelector('input[type="checkbox"]');
          if (checkbox) checkbox.click();
          refocusDateInput();
        }
      });
    });

    function clearInput() {
      input.value = "";
      output.classList.remove("show");
      output.textContent = "";
      input.focus();
      calculateAge();
    }

    function calculateAge() {
      const inputVal = input.value.trim();
      const dateMatch = inputVal.match(/(\d{2})\s*[-/]\s*(\d{2})\s*[-/]\s*(\d{2,4})/);

      if (!dateMatch) {
        output.classList.remove("show");
        output.innerHTML = "";
        return;
      }

      output.classList.add("show");

      let [_, dayStr, monthStr, yearStr] = dateMatch;
      const day = parseInt(dayStr, 10);
      const month = parseInt(monthStr, 10);
      let year = parseInt(yearStr, 10);

      if (yearStr.length === 2) {
        year = year > 30 ? 1900 + year : 2000 + year;
      }

      const inputDate = new Date(year, month - 1, day);

      if (isNaN(inputDate.getTime()) || inputDate.getDate() !== day || inputDate.getMonth() !== month - 1 || inputDate.getFullYear() !== year) {
        output.textContent = "Invalid date.";
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let output1Text;
      if (inputDate.getTime() === today.getTime()) {
        output1Text = "Today";
      } else {
        const isPast = inputDate < today;
        const start = isPast ? inputDate : today;
        const end = isPast ? today : inputDate;

        let yearsDiff = end.getFullYear() - start.getFullYear();
        let monthsDiff = end.getMonth() - start.getMonth();
        let daysDiff = end.getDate() - start.getDate();

        if (daysDiff < 0) {
          monthsDiff--;
          const lastDayOfPrevMonth = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
          daysDiff += lastDayOfPrevMonth;
        }
        if (monthsDiff < 0) {
          yearsDiff--;
          monthsDiff += 12;
        }

        const parts = [];
        if (yearsDiff > 0) parts.push(`${yearsDiff} year${yearsDiff === 1 ? '' : 's'}`);
        if (monthsDiff > 0) parts.push(`${monthsDiff} month${monthsDiff === 1 ? '' : 's'}`);
        if (daysDiff > 0) parts.push(`${daysDiff} day${daysDiff === 1 ? '' : 's'}`);

        let diffString = parts.join(', ');
        if (totalDaysToggle.checked) {
          const totalDays = Math.round((end - start) / 86400000);
          diffString += ` (${totalDays} day${totalDays === 1 ? '' : 's'})`;
        }
        output1Text = isPast ? `${diffString} ` : `In ${diffString}`;
      }

      if (orderToggle.checked && output1Text !== "Today" && output1Text) {
          output1Text = `Order left: ${output1Text}`;
      }

      const futureDate = new Date(inputDate);
      futureDate.setDate(futureDate.getDate() + 30);

      const getDaySuffix = (d) => {
        if (d > 3 && d < 21) return 'th';
        switch (d % 10) {
          case 1: return "st"; case 2: return "nd"; case 3: return "rd"; default: return "th";
        }
      };

      const dayOfMonth = futureDate.getDate();
      const monthName = futureDate.toLocaleString('en-GB', { month: 'long' });
      const fullYear = futureDate.getFullYear();
      const formattedFutureDate = `${dayOfMonth}${getDaySuffix(dayOfMonth)} ${monthName} ${fullYear}`;
      const output2Text = `Expiry: ${formattedFutureDate}`;

      if (orderToggle.checked && output1Text !== "Today" && output1Text) {
        output.innerHTML = `${output1Text}<br>${output2Text}`;
      } else {
        output.innerHTML = output1Text;
      }
    }

    const clockText = document.getElementById('clockText');

    function updateClock() {
      if (!clockText) return;
      const now = new Date();
      clockText.textContent = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>

  <script>
    /*
      Visual-only title animation.
      Existing date checker functions/scripts are untouched.
      Adds the same style of scramble boot animation used by the Welcome title.
    */
    (function () {
      const glyphs = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&?';
      const titleEl = document.querySelector('#container h2');

      if (!titleEl) return;

      const finalText = (titleEl.textContent || '').trim().toUpperCase();
      if (!finalText) return;

      titleEl.dataset.finalTitle = finalText;
      titleEl.classList.add('kt-title-scrambling');

      let frame = 0;
      const maxFrames = Math.max(28, finalText.length + 14);

      const interval = setInterval(() => {
        titleEl.textContent = finalText
          .split('')
          .map((char, index) => {
            if (char === ' ') return ' ';
            if (frame / 2 > index + 2) return char;
            return glyphs[Math.floor(Math.random() * glyphs.length)];
          })
          .join('');

        frame += 1;

        if (frame > maxFrames) {
          titleEl.textContent = finalText;
          titleEl.classList.remove('kt-title-scrambling');
          clearInterval(interval);
        }
      }, 46);
    })();
  </script>
